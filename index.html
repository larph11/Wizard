<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIZARD - MEGA CHAOS</title>
    <style>
        :root { --bg: #0b0b0e; --gold: #ffd700; --ui: #1a1a1a; --active: #4e7fff; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; overflow: hidden; height: 100vh; }
        
        #setup-screen { position: absolute; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .setup-box { background: #1a1a1a; padding: 20px; border: 2px solid #444; border-radius: 12px; width: 90%; max-width: 400px; }
        input { background: #333; border: 1px solid #666; color: white; padding: 8px; width: 100px; border-radius: 4px; margin: 5px; text-align: center; }
        
        #game-wrapper { width: 95vw; max-width: 500px; display: flex; flex-direction: column; gap: 5px; height: 100vh; padding: 5px 0; }
        canvas { width: 100%; aspect-ratio: 1/1; image-rendering: pixelated; border: 2px solid #444; background: #222; }
        
        .audio-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 300; }
        .audio-btn { background: rgba(0,0,0,0.6); border: 1px solid #555; color: white; padding: 8px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        
        .turn-pop { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid var(--gold); padding: 20px; text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.4s; z-index: 150; width: 70%; border-radius: 10px; }
        .show-pop { opacity: 1; }

        .hp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: var(--ui); padding: 8px; font-size: 10px; border-radius: 5px; }
        .hp-item { border: 1px solid #333; padding: 4px; border-radius: 3px; }
        .hp-bar { height: 6px; background: #222; width: 100%; margin-top: 3px; border-radius: 3px; overflow: hidden; }
        .hp-fill { height: 100%; background: #ff4e4e; transition: width 0.3s; }
        .active-p { border-color: var(--gold); background: #2a2a20; box-shadow: 0 0 5px var(--gold); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: var(--ui); padding: 10px; border-radius: 5px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 12px 2px; font-size: 10px; font-weight: bold; border-radius: 4px; }
        button.skill-selected { background: var(--active); border-color: white; }
        #confirm-btn { grid-column: span 2; background: #1b5e20; display: none; font-size: 16px; border: 2px solid #fff; margin-top: 5px;}
        #history { flex-grow: 1; background: #000; padding: 8px; font-size: 10px; overflow-y: auto; border: 1px solid #333; border-radius: 5px; color: #888; }
        .quake { animation: quake 0.4s infinite; }
        @keyframes quake { 0% {transform:translate(4px,4px)} 50% {transform:translate(-4px,-4px)} 100% {transform:translate(0,0)} }
    </style>
</head>
<body>

<div class="audio-controls">
    <button id="music-btn" class="audio-btn" onclick="toggleMusic()">🎵 ON</button>
    <button id="sfx-btn" class="audio-btn" onclick="toggleSFX()">🔊 ON</button>
</div>

<audio id="bgm" src="background.mp3" loop></audio>
<audio id="sndHit" src="hit.mp3"></audio>
<audio id="sndMiss" src="miss.mp3"></audio>

<div id="setup-screen">
    <div class="setup-box">
        <h1 style="color:var(--gold); margin-top:0;">CHAOS SETUP</h1>
        
        <label>Player Count: </label>
        <input type="number" id="p-count" value="2" min="2" max="8" onchange="genInputs()"><br>
        
        <label>Starting HP: </label>
        <input type="number" id="start-hp" value="100" min="10" max="999"><br>

        <div id="p-names" style="max-height: 30vh; overflow-y: auto; margin: 15px 0; border-top: 1px solid #444; padding-top: 10px;"></div>
        
        <button onclick="startGame()" style="width: 100%; padding: 15px; font-size: 18px; background: var(--active); color: white; border: none; border-radius: 8px; cursor: pointer;">START BATTLE</button>
    </div>
</div>

<div id="game-wrapper">
    <div id="hp-container" class="hp-grid"></div>
    <div style="position: relative;">
        <canvas id="gameCanvas" width="800" height="800"></canvas>
        <div id="turn-pop" class="turn-pop">
            <h1 id="pop-name">WIZARD</h1>
            <p id="pop-task">ACTION</p>
        </div>
    </div>
    <div class="controls" id="ui-controls">
        <button id="btn-KO" onclick="pickSkill('KO')">ONE-HIT KO</button>
        <button id="btn-AREA" onclick="pickSkill('AREA')">MASS BLAST</button>
        <button id="btn-LINE" onclick="pickSkill('LINE')">CROSS ATTACK</button>
        <button id="btn-DIAG" onclick="pickSkill('DIAG')">X-BEAM</button>
        <button id="btn-QUEEN" onclick="pickSkill('QUEEN')">MEGA QUEEN</button>
        <button id="confirm-btn" onclick="handleConfirm()">CONFIRM ACTION</button>
    </div>
    <div id="history"></div>
</div>

<script>
    // ==========================================
    // EASY DAMAGE CONFIGURATION
    // Change these numbers to adjust balance
    // ==========================================
    const DAMAGE_VALUES = {
        'KO':    100,  // Damage for One-Hit KO
        'AREA':  30,   // Damage for Mass Blast
        'LINE':  50,   // Damage for Thick Cross
        'DIAG':  50,   // Damage for Thick X-Diagonal
        'QUEEN': 35    // Damage for Mega Queen
    };
    
    const CRIT_CHANCE = 0.10; // 10% chance for Double Damage
    // ==========================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('game-wrapper');
    const bgm = document.getElementById('bgm');
    const sndHit = document.getElementById('sndHit');
    const sndMiss = document.getElementById('sndMiss');
    
    let musicMuted = false, sfxMuted = false, initialHP = 100;
    let players = [], turnIdx = 0, dodgingIdx = -1;
    let gridSize = 10, ts = 80;
    let state = 'IDLE', selectedSkill = null, aimTile = null;
    let tempDodges = {};

    function toggleMusic() { musicMuted = !musicMuted; bgm.muted = musicMuted; document.getElementById('music-btn').innerText = musicMuted ? "🎵 OFF" : "🎵 ON"; }
    function toggleSFX() { sfxMuted = !sfxMuted; sndHit.muted = sfxMuted; sndMiss.muted = sfxMuted; document.getElementById('sfx-btn').innerText = sfxMuted ? "🔊 OFF" : "🔊 ON"; }

    function genInputs() {
        const count = document.getElementById('p-count').value;
        const div = document.getElementById('p-names');
        div.innerHTML = '';
        for(let i=0; i<count; i++) div.innerHTML += `<div>P${i+1}: <input id="name-${i}" value="Wizard ${i+1}"></div>`;
    }
    genInputs();

    function startGame() {
        bgm.play().catch(() => {});
        const count = parseInt(document.getElementById('p-count').value);
        initialHP = parseInt(document.getElementById('start-hp').value);

        if(count <= 2) gridSize = 10;
        else if(count === 3) gridSize = 12;
        else if(count === 4) gridSize = 16;
        else gridSize = 32;
        
        ts = 800 / gridSize;
        players = [];
        for(let i=0; i<count; i++) {
            players.push({
                name: document.getElementById('name-'+i).value,
                hp: initialHP, maxHp: initialHP,
                x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize),
                color: `hsl(${(i * 360/count)}, 70%, 60%)`, alive: true
            });
        }
        document.getElementById('setup-screen').style.display = 'none';
        startAttackerPhase();
    }

    function executeChaos() {
        state = 'ANIMATING';
        const range = getRange(selectedSkill, aimTile);
        let hits = [];
        for(let i in tempDodges) { players[i].x = tempDodges[i].x; players[i].y = tempDodges[i].y; }

        players.forEach((p, i) => {
            if(!p.alive || i === turnIdx) return;
            if(range.some(r => r.x === p.x && r.y === p.y)) hits.push(i);
        });

        if(hits.length > 0) {
            wrapper.classList.add('quake'); if(!sfxMuted) sndHit.play();
        } else { if(!sfxMuted) sndMiss.play(); }

        hits.forEach(i => {
            let p = players[i];
            let dmg = DAMAGE_VALUES[selectedSkill] || 20;
            
            // Critical Hit Logic
            if(Math.random() < CRIT_CHANCE) {
                dmg *= 2;
                log(`CRITICAL HIT! ${p.name} took ${dmg} damage!`);
            } else {
                log(`${p.name} hit for ${dmg} damage.`);
            }

            p.hp -= dmg; if(p.hp <= 0) p.alive = false;
        });

        setTimeout(() => { wrapper.classList.remove('quake'); checkWinState(); }, 1000);
        let count = 0;
        const anim = setInterval(() => {
            render();
            ctx.fillStyle = hits.length > 0 ? 'rgba(255,50,50,0.5)' : 'rgba(100,200,255,0.3)';
            range.forEach(t => ctx.fillRect(t.x*ts, t.y*ts, ts, ts));
            if(count++ > 15) clearInterval(anim);
        }, 50);
    }

    // --- RANGE LOGIC (UNCHANGED BUT ROBUST) ---
    function getRange(skill, origin) {
        if(!origin) return [];
        let t = []; const {x, y} = origin;
        function addZone(cx, cy) {
            if(gridSize < 32) t.push({x: cx, y: cy});
            else { for(let dx=-1; dx<=1; dx++) for(let dy=-1; dy<=1; dy++) t.push({x: cx+dx, y: cy+dy}); }
        }
        if(skill==='KO') addZone(x, y);
        if(skill==='LINE') { for(let i=0; i<gridSize; i++) { addZone(i, y); addZone(x, i); } }
        if(skill==='DIAG') { for(let i=-gridSize; i<gridSize; i++) { addZone(x+i, y+i); addZone(x+i, y-i); } }
        if(skill==='AREA') {
            let areaSize = (gridSize === 32) ? 6 : 2;
            for(let i=-areaSize; i<=areaSize; i++) for(let j=-areaSize; j<=areaSize; j++) t.push({x: x+i, y: y+j});
        }
        if(skill==='QUEEN') {
            for(let i=0; i<gridSize; i++) {
                addZone(x+i, y); addZone(x-i, y); addZone(x, y+i); addZone(x, y-i);
                addZone(x+i, y+i); addZone(x-i, y-i); addZone(x+i, y-i); addZone(x-i, y+i);
            }
        }
        const seen = new Set();
        return t.filter(v => {
            const key = `${v.x},${v.y}`;
            if(v.x>=0 && v.x<gridSize && v.y>=0 && v.y<gridSize && !seen.has(key)) { seen.add(key); return true; }
            return false;
        });
    }

    // --- RENDER & TURN LOGIC ---
    function startAttackerPhase() {
        state = 'AIMING_PHASE'; selectedSkill = null; aimTile = null; tempDodges = {};
        updateHP();
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('skill-selected'));
        document.getElementById('ui-controls').style.opacity = '1';
        document.getElementById('confirm-btn').style.display = 'none';
        showNotification(players[turnIdx].name, "AIM YOUR SPELL");
        render();
    }
    function render() {
        ctx.clearRect(0,0,800,800);
        for(let i=0;i<gridSize;i++) for(let j=0;j<gridSize;j++) {
            ctx.fillStyle = (i+j)%2===0 ? '#1a1a1a' : '#222'; ctx.fillRect(i*ts, j*ts, ts, ts);
        }
        if(state === 'AIMING_PHASE' && aimTile) {
            ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
            getRange(selectedSkill, aimTile).forEach(t => ctx.fillRect(t.x*ts, t.y*ts, ts, ts));
        }
        if(state === 'DODGING_PHASE' && tempDodges[dodgingIdx]) {
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.strokeRect(tempDodges[dodgingIdx].x*ts, tempDodges[dodgingIdx].y*ts, ts, ts);
        }
        players.forEach(p => { if(p.alive) {
            ctx.fillStyle = p.color; ctx.fillRect(p.x*ts+ts*0.2, p.y*ts+ts*0.2, ts*0.6, ts*0.6);
            ctx.fillStyle = "white"; ctx.font = `${Math.max(ts*0.4, 8)}px monospace`; ctx.textAlign = "center";
            ctx.fillText(p.name, p.x*ts + ts/2, p.y*ts - 2);
        }});
    }
    function showNotification(name, task) {
        const pop = document.getElementById('turn-pop'); document.getElementById('pop-name').innerText = name;
        document.getElementById('pop-name').style.color = players.find(p=>p.name===name)?.color || 'white';
        document.getElementById('pop-task').innerText = task; pop.classList.add('show-pop');
        setTimeout(()=>pop.classList.remove('show-pop'), 1200);
    }
    function updateHP() {
        const cont = document.getElementById('hp-container'); cont.innerHTML = '';
        players.forEach((p, i) => { 
            let pct = (p.hp / p.maxHp) * 100;
            cont.innerHTML += `<div class="hp-item ${i===turnIdx?'active-p':''}" style="opacity:${p.alive?1:0.3}">
            <div style="color:${p.color}; font-weight:bold">${p.name} (${p.hp})</div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%"></div></div></div>`; 
        });
    }
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor(((e.clientX - rect.left) / rect.width) * gridSize);
        const y = Math.floor(((e.clientY - rect.top) / rect.height) * gridSize);
        if(state === 'AIMING_PHASE' && selectedSkill) { aimTile = {x, y}; document.getElementById('confirm-btn').style.display = 'block'; }
        else if(state === 'DODGING_PHASE') { tempDodges[dodgingIdx] = {x, y}; document.getElementById('confirm-btn').style.display = 'block'; }
        render();
    });
    function pickSkill(s) { if(state !== 'AIMING_PHASE') return; selectedSkill = s; document.querySelectorAll('.controls button').forEach(b => b.classList.remove('skill-selected')); document.getElementById('btn-' + s).classList.add('skill-selected'); render(); }
    function handleConfirm() { if(state === 'AIMING_PHASE') startNextDodge(0); else if(state === 'DODGING_PHASE') startNextDodge(dodgingIdx + 1); }
    function startNextDodge(startFrom) {
        dodgingIdx = startFrom; while(dodgingIdx < players.length && (dodgingIdx === turnIdx || !players[dodgingIdx].alive)) dodgingIdx++;
        if(dodgingIdx >= players.length) executeChaos();
        else { state = 'DODGING_PHASE'; document.getElementById('ui-controls').style.opacity = '0.3'; document.getElementById('confirm-btn').style.display = 'none'; tempDodges[dodgingIdx] = {x: players[dodgingIdx].x, y: players[dodgingIdx].y}; showNotification(players[dodgingIdx].name, "CHOOSE YOUR DODGE"); render(); }
    }
    function checkWinState() {
        const survivors = players.filter(p => p.alive);
        if(survivors.length <= 1) { alert("WINNER: " + (survivors[0]?.name || "NONE")); location.reload(); }
        else { do { turnIdx = (turnIdx + 1) % players.length; } while (!players[turnIdx].alive); startAttackerPhase(); }
    }
    function log(m) { const h = document.getElementById('history'); h.innerHTML = `<div>> ${m}</div>` + h.innerHTML; }
</script>
</body>
</html>
